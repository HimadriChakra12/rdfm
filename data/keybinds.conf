# rdfm keybindings reference
# ─────────────────────────────────────────────────────────────────────────────
# This file is DOCUMENTATION ONLY — rdfm reads keybinds from the GTK accel
# map and from the hard-coded handlers in src/main-win.c.  Copy the user
# variant to ~/.config/rdfm/keybinds.conf and uncomment / edit lines there
# to record your own overrides for future reference.
#
# Format:   action = <Modifier>key   (GTK accelerator string)
# Modifiers: <Ctrl>  <Shift>  <Alt>  <Super>  (combinable: <Ctrl><Shift>)
# ─────────────────────────────────────────────────────────────────────────────

[vim-navigation]
# Active when the folder-view panel has keyboard focus.
# These are compiled-in (src/main-win.c : on_view_key_press_event).

move_down          = j              # move item selection down
move_up            = k              # move item selection up
go_back            = h              # navigate back  (history)
go_forward         = l              # navigate forward (history)
go_home            = <Shift>H       # jump to home directory
go_parent          = BackSpace      # go up one level (also: Alt+Up)

[find-and-location]
# Active at window level (src/main-win.c : on_key_press_event).

focus_location_bar = slash          # type '/' to jump to path / inline find
focus_location_bar_home = asciitilde  # type '~' to start from home in path bar
cancel_location    = Escape         # return focus to folder view, reset path

[tabs]
next_tab           = <Ctrl>Tab      # or Ctrl+PageDown
prev_tab           = <Ctrl><Shift>Tab  # or Ctrl+PageUp
switch_to_tab_n    = <Alt>1         # Alt+1 … Alt+9, Alt+0 = last tab
new_tab            = <Ctrl>t
close_tab          = <Ctrl>w

[navigation-menu-accelerators]
# Standard GTK menu accelerators (defined in data/ui/*.xml).
go_up              = <Alt>Up
go_back_alt        = <Alt>Left
go_forward_alt     = <Alt>Right
go_home_alt        = <Alt>Home
reload             = F5
search             = <Ctrl>f        # opens find-files dialog

[view]
size_bigger        = <Ctrl>equal    # or Ctrl+ScrollUp
size_smaller       = <Ctrl>minus    # or Ctrl+ScrollDown
show_hidden        = <Ctrl>h
