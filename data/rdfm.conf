# rdfm configuration file
# Colors accept any CSS/X11 color string: #rrggbb, #rrggbbaa, rgb(), named colors.
# icon_theme and gtk_theme override system GTK settings without needing GTK2/3 config files.

[config]
bm_open_method=0

[volume]
mount_on_startup=1
mount_removable=1
autorun=1

[desktop]
show_wm_menu=0

[ui]
app_bg=#1a1a2e
app_fg=#e0e0e0
toolbar_bg=#16213e
toolbar_fg=#e0e0e0
pathbar_bg=#0f3460
pathbar_fg=#ffffff
view_bg=#1a1a2e
view_fg=#e0e0e0
sel_bg=#e040fb
sel_fg=#1a1a2e
side_pane_bg=#16213e
side_pane_fg=#e0e0e0
app_font=JetBrains Mono 11
win_width=900
win_height=560
side_pane_mode=places
view_mode=icon
show_hidden=0
sort=name;ascending;
