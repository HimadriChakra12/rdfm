# pcmanfm configuration file
# Colors accept any CSS/X11 color string: #rrggbb, #rrggbbaa, rgb(), named colors.
# icon_theme and gtk_theme override system GTK settings without needing GTK2/3 config files.

[config]
bm_open_method=0

[volume]
mount_on_startup=1
mount_removable=1
autorun=1

[desktop]
wallpaper_mode=color
desktop_bg=#1a1a2e
desktop_fg=#e0e0e0
desktop_shadow=#000000
show_wm_menu=0

[ui]
win_width=900
win_height=560
side_pane_mode=places
view_mode=icon
show_hidden=0
sort=name;ascending;
# icon_theme=Papirus
# gtk_theme=Adwaita
